apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: models.plastikube.dev
spec:
  group: plastikube.dev
  names:
    kind: model
    plural: models
    singular: model
    shortNames:
      - model
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: modelSpec defines the desired state of model
              properties:
                image:
                  type: string
                  description: image specifies the container image to use for the model
                imagePullSecret:
                  type: string
                  description: imagePullSecret specifies the secret to use for pulling the image
                modelStorage:
                  type: object
                  properties:
                    persistentVolumeClaim:
                      type: object
                      properties:
                        accessModes:
                          type: array
                          items:
                            type: string
                          description: "accessModes contains the desired access modes the volume should
                            have. More info:
                            https://kubernetes.io/docs/concepts/storage/persist\
                            ent-volumes#access-modes-1"
                        dataSource:
                          type: object
                          properties:
                            apiGroup:
                              type: string
                              description: APIGroup is the group for the resource being referenced. If
                                APIGroup is not specified, the specified Kind
                                must be in the core API group. For any other
                                third-party types, APIGroup is required.
                            kind:
                              type: string
                              description: Kind is the type of resource being referenced
                            name:
                              type: string
                              description: Name is the name of resource being referenced
                          required:
                            - kind
                            - name
                        dataSourceRef:
                          type: object
                          properties:
                            apiGroup:
                              type: string
                              description: APIGroup is the group for the resource being referenced. If
                                APIGroup is not specified, the specified Kind
                                must be in the core API group. For any other
                                third-party types, APIGroup is required.
                            kind:
                              type: string
                              description: Kind is the type of resource being referenced
                            name:
                              type: string
                              description: Name is the name of resource being referenced
                            namespace:
                              type: string
                              description: Namespace is the namespace of resource being referenced Note that
                                when a namespace is specified, a
                                gateway.networking.k8s.io/ReferenceGrant object
                                is required in the referent namespace to allow
                                that namespace\'s owner to accept the reference.
                                See the ReferenceGrant documentation for
                                details. (Alpha) This field requires the
                                CrossNamespaceVolumeDataSource feature gate to
                                be enabled.
                          required:
                            - kind
                            - name
                        resources:
                          type: object
                          properties:
                            limits:
                              type: object
                              properties: {}
                              description: "Limits describes the maximum amount of compute resources allowed.
                                More info:
                                https://kubernetes.io/docs/concepts/configurati\
                                on/manage-resources-containers/"
                            requests:
                              type: object
                              properties: {}
                              description: "Requests describes the minimum amount of compute resources
                                required. If Requests is omitted for a
                                container, it defaults to Limits if that is
                                explicitly specified, otherwise to an
                                implementation-defined value. Requests cannot
                                exceed Limits. More info:
                                https://kubernetes.io/docs/concepts/configurati\
                                on/manage-resources-containers/"
                        selector:
                          type: object
                          properties:
                            matchExpressions:
                              type: array
                              items:
                                type: object
                                properties:
                                  key:
                                    type: string
                                    description: key is the label key that the selector applies to.
                                  operator:
                                    type: string
                                    description: operator represents a key\'s relationship to a set of values. Valid
                                      operators are In, NotIn, Exists and
                                      DoesNotExist.
                                  values:
                                    type: array
                                    items:
                                      type: string
                                    description: values is an array of string values. If the operator is In or
                                      NotIn, the values array must be non-empty.
                                      If the operator is Exists or DoesNotExist,
                                      the values array must be empty. This array
                                      is replaced during a strategic merge
                                      patch.
                                required:
                                  - key
                                  - operator
                              description: matchExpressions is a list of label selector requirements. The
                                requirements are ANDed.
                            matchLabels:
                              type: object
                              properties: {}
                              description: matchLabels is a map of {key,value} pairs. A single {key,value} in
                                the matchLabels map is equivalent to an element
                                of matchExpressions, whose key field is \"key\",
                                the operator is \"In\", and the values array
                                contains only \"value\". The requirements are
                                ANDed.
                        storageClassName:
                          type: string
                          description: "storageClassName is the name of the StorageClass required by the
                            claim. More info:
                            https://kubernetes.io/docs/concepts/storage/persist\
                            ent-volumes#class-1"
                        volumeAttributesClassName:
                          type: string
                          description: "volumeAttributesClassName may be used to set the
                            VolumeAttributesClass used by this claim. If
                            specified, the CSI driver will create or update the
                            volume with the attributes defined in the
                            corresponding VolumeAttributesClass. This has a
                            different purpose than storageClassName, it can be
                            changed after the claim is created. An empty string
                            or nil value indicates that no VolumeAttributesClass
                            will be applied to the claim. If the claim enters an
                            Infeasible error state, this field can be reset to
                            its previous value (including nil) to cancel the
                            modification. If the resource referred to by
                            volumeAttributesClass does not exist, this
                            PersistentVolumeClaim will be set to a Pending
                            state, as reflected by the modifyVolumeStatus field,
                            until such as a resource exists. More info:
                            https://kubernetes.io/docs/concepts/storage/volume-\
                            attributes-classes/"
                        volumeMode:
                          type: string
                          description: volumeMode defines what type of volume is required by the claim.
                            Value of Filesystem is implied when not included in
                            claim spec.
                        volumeName:
                          type: string
                          description: volumeName is the binding reference to the PersistentVolume backing
                            this claim.
                      description: PersistentVolumeClaim defines a new PVC to create for storing the
                        model
                    existingVolume:
                      type: string
                      description: existingVolume references an existing PVC to use for storing the
                        model
                    path:
                      type: string
                      description: path specifies the path within the PVC to load the model from
                    download:
                      type: object
                      properties:
                        type:
                          type: string
                          description: type specifies the download type
                        source:
                          type: string
                          description: source specifies the download source URL / huggingface
                            repo/filename
                        job:
                          type: object
                          properties:
                            image:
                              type: string
                              description: image specifies the container image to use for downloading the
                                model
                            imagePullSecret:
                              type: string
                              description: imagePullSecret specifies the secret to use for pulling the
                                downloader image
                            entrypoint:
                              type: array
                              items:
                                type: string
                              description: entrypoint overrides the image entrypoint for the downloader
                            args:
                              type: array
                              items:
                                type: string
                              description: args overrides the image args for the downloader
                            env:
                              type: array
                              items:
                                type: object
                                properties:
                                  name:
                                    type: string
                                    description: Name of the environment variable. May consist of any printable
                                      ASCII characters except \'=\'.
                                  value:
                                    type: string
                                    description: 'Variable references $(VAR_NAME) are expanded using the previously
                                      defined environment variables in the
                                      container and any service environment
                                      variables. If a variable cannot be
                                      resolved, the reference in the input
                                      string will be unchanged. Double $$ are
                                      reduced to a single $, which allows for
                                      escaping the $(VAR_NAME) syntax: i.e.
                                      \"$$(VAR_NAME)\" will produce the string
                                      literal \"$(VAR_NAME)\". Escaped
                                      references will never be expanded,
                                      regardless of whether the variable exists
                                      or not. Defaults to \"\".'
                                  valueFrom:
                                    type: object
                                    properties:
                                      configMapKeyRef:
                                        type: object
                                        properties:
                                          key:
                                            type: string
                                            description: The key to select.
                                          name:
                                            type: string
                                            description: "Name of the referent. This field is effectively required, but due
                                              to backwards compatibility is
                                              allowed to be empty. Instances of
                                              this type with an empty value here
                                              are almost certainly wrong. More
                                              info:
                                              https://kubernetes.io/docs/concep\
                                              ts/overview/working-with-objects/\
                                              names/#names"
                                          optional:
                                            type: boolean
                                            description: Specify whether the ConfigMap or its key must be defined
                                        required:
                                          - key
                                      fieldRef:
                                        type: object
                                        properties:
                                          apiVersion:
                                            type: string
                                            description: Version of the schema the FieldPath is written in terms of,
                                              defaults to \"v1\".
                                          fieldPath:
                                            type: string
                                            description: Path of the field to select in the specified API version.
                                        required:
                                          - fieldPath
                                      fileKeyRef:
                                        type: object
                                        properties:
                                          key:
                                            type: string
                                            description: The key within the env file. An invalid key will prevent the pod
                                              from starting. The keys defined
                                              within a source may consist of any
                                              printable ASCII characters except
                                              \'=\'. During Alpha stage of the
                                              EnvFiles feature gate, the key
                                              size is limited to 128 characters.
                                          optional:
                                            type: boolean
                                            description: Specify whether the file or its key must be defined. If the file or
                                              key does not exist, then the env
                                              var is not published. If optional
                                              is set to true and the specified
                                              key does not exist, the
                                              environment variable will not be
                                              set in the Pod\'s containers.  If
                                              optional is set to false and the
                                              specified key does not exist, an
                                              error will be returned during Pod
                                              creation.
                                          path:
                                            type: string
                                            description: The path within the volume from which to select the file. Must be
                                              relative and may not contain the
                                              \'..\' path or start with \'..\'.
                                          volumeName:
                                            type: string
                                            description: The name of the volume mount containing the env file.
                                        required:
                                          - key
                                          - path
                                          - volumeName
                                      resourceFieldRef:
                                        type: object
                                        properties:
                                          containerName:
                                            type: string
                                            description: "Container name: required for volumes, optional for env vars"
                                          divisor:
                                            type: string
                                            description: Specifies the output format of the exposed resources, defaults to
                                              \"1\"
                                          resource:
                                            type: string
                                            description: "Required: resource to select"
                                        required:
                                          - resource
                                      secretKeyRef:
                                        type: object
                                        properties:
                                          key:
                                            type: string
                                            description: The key of the secret to select from.  Must be a valid secret key.
                                          name:
                                            type: string
                                            description: "Name of the referent. This field is effectively required, but due
                                              to backwards compatibility is
                                              allowed to be empty. Instances of
                                              this type with an empty value here
                                              are almost certainly wrong. More
                                              info:
                                              https://kubernetes.io/docs/concep\
                                              ts/overview/working-with-objects/\
                                              names/#names"
                                          optional:
                                            type: boolean
                                            description: Specify whether the Secret or its key must be defined
                                        required:
                                          - key
                                required:
                                  - name
                              description: env specifies extra environment variables to set in the downloader
                                container
                            securityContext:
                              type: object
                              properties:
                                appArmorProfile:
                                  type: object
                                  properties:
                                    localhostProfile:
                                      type: string
                                      description: localhostProfile indicates a profile loaded on the node that should
                                        be used. The profile must be
                                        preconfigured on the node to work. Must
                                        match the loaded name of the profile.
                                        Must be set if and only if type is
                                        \"Localhost\".
                                    type:
                                      type: string
                                      description: "type indicates which kind of AppArmor profile will be applied.
                                        Valid options are:   Localhost - a
                                        profile pre-loaded on the
                                        node.   RuntimeDefault - the container
                                        runtime\\'s default
                                        profile.   Unconfined - no AppArmor
                                        enforcement."
                                  required:
                                    - type
                                fsGroup:
                                  type: number
                                  description: "A special supplemental group that applies to all containers in a
                                    pod. Some volume types allow the Kubelet to
                                    change the ownership of that volume to be
                                    owned by the pod:  1. The owning GID will be
                                    the FSGroup 2. The setgid bit is set (new
                                    files created in the volume will be owned by
                                    FSGroup) 3. The permission bits are OR\\'d
                                    with rw-rw----  If unset, the Kubelet will
                                    not modify the ownership and permissions of
                                    any volume. Note that this field cannot be
                                    set when spec.os.name is windows."
                                fsGroupChangePolicy:
                                  type: string
                                  description: 'fsGroupChangePolicy defines behavior of changing ownership and
                                    permission of the volume before being
                                    exposed inside Pod. This field will only
                                    apply to volume types which support fsGroup
                                    based ownership(and permissions). It will
                                    have no effect on ephemeral volume types
                                    such as: secret, configmaps and emptydir.
                                    Valid values are \"OnRootMismatch\" and
                                    \"Always\". If not specified, \"Always\" is
                                    used. Note that this field cannot be set
                                    when spec.os.name is windows.'
                                runAsGroup:
                                  type: number
                                  description: The GID to run the entrypoint of the container process. Uses
                                    runtime default if unset. May also be set in
                                    SecurityContext.  If set in both
                                    SecurityContext and PodSecurityContext, the
                                    value specified in SecurityContext takes
                                    precedence for that container. Note that
                                    this field cannot be set when spec.os.name
                                    is windows.
                                runAsNonRoot:
                                  type: boolean
                                  description: Indicates that the container must run as a non-root user. If true,
                                    the Kubelet will validate the image at
                                    runtime to ensure that it does not run as
                                    UID 0 (root) and fail to start the container
                                    if it does. If unset or false, no such
                                    validation will be performed. May also be
                                    set in SecurityContext.  If set in both
                                    SecurityContext and PodSecurityContext, the
                                    value specified in SecurityContext takes
                                    precedence.
                                runAsUser:
                                  type: number
                                  description: The UID to run the entrypoint of the container process. Defaults to
                                    user specified in image metadata if
                                    unspecified. May also be set in
                                    SecurityContext.  If set in both
                                    SecurityContext and PodSecurityContext, the
                                    value specified in SecurityContext takes
                                    precedence for that container. Note that
                                    this field cannot be set when spec.os.name
                                    is windows.
                                seLinuxChangePolicy:
                                  type: string
                                  description: "seLinuxChangePolicy defines how the container\\'s SELinux label is
                                    applied to all volumes used by the Pod. It
                                    has no effect on nodes that do not support
                                    SELinux or to volumes does not support
                                    SELinux. Valid values are
                                    \\\"MountOption\\\" and
                                    \\\"Recursive\\\".  \\\"Recursive\\\" means
                                    relabeling of all files on all Pod volumes
                                    by the container runtime. This may be slow
                                    for large volumes, but allows mixing
                                    privileged and unprivileged Pods sharing the
                                    same volume on the same
                                    node.  \\\"MountOption\\\" mounts all
                                    eligible Pod volumes with `-o context` mount
                                    option. This requires all Pods that share
                                    the same volume to use the same SELinux
                                    label. It is not possible to share the same
                                    volume among privileged and unprivileged
                                    Pods. Eligible volumes are in-tree
                                    FibreChannel and iSCSI volumes, and all CSI
                                    volumes whose CSI driver announces SELinux
                                    support by setting spec.seLinuxMount: true
                                    in their CSIDriver instance. Other volumes
                                    are always re-labelled recursively.
                                    \\\"MountOption\\\" value is allowed only
                                    when SELinuxMount feature gate is
                                    enabled.  If not specified and SELinuxMount
                                    feature gate is enabled, \\\"MountOption\\\"
                                    is used. If not specified and SELinuxMount
                                    feature gate is disabled,
                                    \\\"MountOption\\\" is used for
                                    ReadWriteOncePod volumes and
                                    \\\"Recursive\\\" for all other
                                    volumes.  This field affects only Pods that
                                    have SELinux label set, either in
                                    PodSecurityContext or in SecurityContext of
                                    all containers.  All Pods that use the same
                                    volume should use the same
                                    seLinuxChangePolicy, otherwise some pods can
                                    get stuck in ContainerCreating state. Note
                                    that this field cannot be set when
                                    spec.os.name is windows."
                                seLinuxOptions:
                                  type: object
                                  properties:
                                    level:
                                      type: string
                                      description: Level is SELinux level label that applies to the container.
                                    role:
                                      type: string
                                      description: Role is a SELinux role label that applies to the container.
                                    type:
                                      type: string
                                      description: Type is a SELinux type label that applies to the container.
                                    user:
                                      type: string
                                      description: User is a SELinux user label that applies to the container.
                                seccompProfile:
                                  type: object
                                  properties:
                                    localhostProfile:
                                      type: string
                                      description: localhostProfile indicates a profile defined in a file on the node
                                        should be used. The profile must be
                                        preconfigured on the node to work. Must
                                        be a descending path, relative to the
                                        kubelet\'s configured seccomp profile
                                        location. Must be set if type is
                                        \"Localhost\". Must NOT be set for any
                                        other type.
                                    type:
                                      type: string
                                      description: "type indicates which kind of seccomp profile will be applied.
                                        Valid options are:  Localhost - a
                                        profile defined in a file on the node
                                        should be used. RuntimeDefault - the
                                        container runtime default profile should
                                        be used. Unconfined - no profile should
                                        be applied."
                                  required:
                                    - type
                                supplementalGroups:
                                  type: array
                                  items:
                                    type: number
                                  description: A list of groups applied to the first process run in each
                                    container, in addition to the container\'s
                                    primary GID and fsGroup (if specified).  If
                                    the SupplementalGroupsPolicy feature is
                                    enabled, the supplementalGroupsPolicy field
                                    determines whether these are in addition to
                                    or instead of any group memberships defined
                                    in the container image. If unspecified, no
                                    additional groups are added, though group
                                    memberships defined in the container image
                                    may still be used, depending on the
                                    supplementalGroupsPolicy field. Note that
                                    this field cannot be set when spec.os.name
                                    is windows.
                                supplementalGroupsPolicy:
                                  type: string
                                  description: Defines how supplemental groups of the first container processes
                                    are calculated. Valid values are \"Merge\"
                                    and \"Strict\". If not specified, \"Merge\"
                                    is used. (Alpha) Using the field requires
                                    the SupplementalGroupsPolicy feature gate to
                                    be enabled and the container runtime must
                                    implement support for this feature. Note
                                    that this field cannot be set when
                                    spec.os.name is windows.
                                sysctls:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      name:
                                        type: string
                                        description: Name of a property to set
                                      value:
                                        type: string
                                        description: Value of a property to set
                                    required:
                                      - name
                                      - value
                                  description: Sysctls hold a list of namespaced sysctls used for the pod. Pods
                                    with unsupported sysctls (by the container
                                    runtime) might fail to launch. Note that
                                    this field cannot be set when spec.os.name
                                    is windows.
                                windowsOptions:
                                  type: object
                                  properties:
                                    gmsaCredentialSpec:
                                      type: string
                                      description: GMSACredentialSpec is where the GMSA admission webhook
                                        (https://github.com/kubernetes-sigs/windows-gmsa)
                                        inlines the contents of the GMSA
                                        credential spec named by the
                                        GMSACredentialSpecName field.
                                    gmsaCredentialSpecName:
                                      type: string
                                      description: GMSACredentialSpecName is the name of the GMSA credential spec to
                                        use.
                                    hostProcess:
                                      type: boolean
                                      description: HostProcess determines if a container should be run as a \'Host
                                        Process\' container. All of a Pod\'s
                                        containers must have the same effective
                                        HostProcess value (it is not allowed to
                                        have a mix of HostProcess containers and
                                        non-HostProcess containers). In
                                        addition, if HostProcess is true then
                                        HostNetwork must also be set to true.
                                    runAsUserName:
                                      type: string
                                      description: The UserName in Windows to run the entrypoint of the container
                                        process. Defaults to the user specified
                                        in image metadata if unspecified. May
                                        also be set in PodSecurityContext. If
                                        set in both SecurityContext and
                                        PodSecurityContext, the value specified
                                        in SecurityContext takes precedence.
                              description: securityContext specifies security settings for the downloader pod
                          description: job specifies the configuration for the download job
                      description: download specifies how to download the model
                  description: modelStorage defines the storage configuration for the model
                engine:
                  type: string
                  description: engine specifies the model engine to use
                features:
                  type: array
                  items:
                    type: string
                  description: features specifies the model features
                resourceProfile:
                  type: string
                  description: >-
                    resourceProfile specifies the resource profile to reference
                    for this model.

                    This is a reference to a predefined resource profile that
                    defines CPU, memory,

                    and other node resources needed for the model.
                entrypoint:
                  type: array
                  items:
                    type: string
                  description: entrypoint overrides the image entrypoint
                args:
                  type: array
                  items:
                    type: string
                  description: args overrides the image args
                env:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Name of the environment variable. May consist of any printable
                          ASCII characters except \'=\'.
                      value:
                        type: string
                        description: 'Variable references $(VAR_NAME) are expanded using the previously
                          defined environment variables in the container and any
                          service environment variables. If a variable cannot be
                          resolved, the reference in the input string will be
                          unchanged. Double $$ are reduced to a single $, which
                          allows for escaping the $(VAR_NAME) syntax: i.e.
                          \"$$(VAR_NAME)\" will produce the string literal
                          \"$(VAR_NAME)\". Escaped references will never be
                          expanded, regardless of whether the variable exists or
                          not. Defaults to \"\".'
                      valueFrom:
                        type: object
                        properties:
                          configMapKeyRef:
                            type: object
                            properties:
                              key:
                                type: string
                                description: The key to select.
                              name:
                                type: string
                                description: "Name of the referent. This field is effectively required, but due
                                  to backwards compatibility is allowed to be
                                  empty. Instances of this type with an empty
                                  value here are almost certainly wrong. More
                                  info:
                                  https://kubernetes.io/docs/concepts/overview/\
                                  working-with-objects/names/#names"
                              optional:
                                type: boolean
                                description: Specify whether the ConfigMap or its key must be defined
                            required:
                              - key
                          fieldRef:
                            type: object
                            properties:
                              apiVersion:
                                type: string
                                description: Version of the schema the FieldPath is written in terms of,
                                  defaults to \"v1\".
                              fieldPath:
                                type: string
                                description: Path of the field to select in the specified API version.
                            required:
                              - fieldPath
                          fileKeyRef:
                            type: object
                            properties:
                              key:
                                type: string
                                description: The key within the env file. An invalid key will prevent the pod
                                  from starting. The keys defined within a
                                  source may consist of any printable ASCII
                                  characters except \'=\'. During Alpha stage of
                                  the EnvFiles feature gate, the key size is
                                  limited to 128 characters.
                              optional:
                                type: boolean
                                description: Specify whether the file or its key must be defined. If the file or
                                  key does not exist, then the env var is not
                                  published. If optional is set to true and the
                                  specified key does not exist, the environment
                                  variable will not be set in the Pod\'s
                                  containers.  If optional is set to false and
                                  the specified key does not exist, an error
                                  will be returned during Pod creation.
                              path:
                                type: string
                                description: The path within the volume from which to select the file. Must be
                                  relative and may not contain the \'..\' path
                                  or start with \'..\'.
                              volumeName:
                                type: string
                                description: The name of the volume mount containing the env file.
                            required:
                              - key
                              - path
                              - volumeName
                          resourceFieldRef:
                            type: object
                            properties:
                              containerName:
                                type: string
                                description: "Container name: required for volumes, optional for env vars"
                              divisor:
                                type: string
                                description: Specifies the output format of the exposed resources, defaults to
                                  \"1\"
                              resource:
                                type: string
                                description: "Required: resource to select"
                            required:
                              - resource
                          secretKeyRef:
                            type: object
                            properties:
                              key:
                                type: string
                                description: The key of the secret to select from.  Must be a valid secret key.
                              name:
                                type: string
                                description: "Name of the referent. This field is effectively required, but due
                                  to backwards compatibility is allowed to be
                                  empty. Instances of this type with an empty
                                  value here are almost certainly wrong. More
                                  info:
                                  https://kubernetes.io/docs/concepts/overview/\
                                  working-with-objects/names/#names"
                              optional:
                                type: boolean
                                description: Specify whether the Secret or its key must be defined
                            required:
                              - key
                    required:
                      - name
                  description: env specifies extra environment variables to set in the container
                replicas:
                  type: number
                  description: replicas specifies the default number of replicas
                autoscaling:
                  type: object
                  properties:
                    minReplicas:
                      type: number
                      description: minReplicas specifies the minimum replicas when autoscaling is
                        enabled
                    maxReplicas:
                      type: number
                      description: maxReplicas specifies the maximum replicas when autoscaling is
                        enabled
                    idleScaleDown:
                      type: number
                      description: idleScaleDown specifies seconds model can be idle before we scale
                        to minReplicas
                    busyScaleUp:
                      type: object
                      properties:
                        bucket:
                          type: number
                          description: bucket specifies seconds to size the bucket
                        activePercent:
                          type: number
                          description: activePercent specifies percentage of the bucket we have to be busy
                            to trigger scaling up
                      required:
                        - bucket
                        - activePercent
                      description: busyScaleUp specifies the scale-up configuration
                  description: autoscaling specifies the autoscaling configuration
                nodeSelector:
                  type: object
                  properties: {}
                  description: >-
                    nodeSelector specifies node labels for pod assignment.

                    Each key-value pair represents a label that must be present
                    on a node for the pod to be scheduled there.
                tolerations:
                  type: array
                  items:
                    type: object
                    properties:
                      effect:
                        type: string
                        description: Effect indicates the taint effect to match. Empty means match all
                          taint effects. When specified, allowed values are
                          NoSchedule, PreferNoSchedule and NoExecute.
                      key:
                        type: string
                        description: Key is the taint key that the toleration applies to. Empty means
                          match all taint keys. If the key is empty, operator
                          must be Exists; this combination means to match all
                          values and all keys.
                      operator:
                        type: string
                        description: Operator represents a key\'s relationship to the value. Valid
                          operators are Exists and Equal. Defaults to Equal.
                          Exists is equivalent to wildcard for value, so that a
                          pod can tolerate all taints of a particular category.
                      tolerationSeconds:
                        type: number
                        description: TolerationSeconds represents the period of time the toleration
                          (which must be of effect NoExecute, otherwise this
                          field is ignored) tolerates the taint. By default, it
                          is not set, which means tolerate the taint forever (do
                          not evict). Zero and negative values will be treated
                          as 0 (evict immediately) by the system.
                      value:
                        type: string
                        description: Value is the taint value the toleration matches to. If the operator
                          is Exists, the value should be empty, otherwise just a
                          regular string.
                  description: tolerations specify the taints that the pod can tolerate.
