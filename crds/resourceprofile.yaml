apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: resourceprofiles.plastikube.dev
spec:
  group: plastikube.dev
  names:
    kind: resourceprofile
    plural: resourceprofiles
    singular: resourceprofile
    shortNames:
      - resourceprofile
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              description: resourceprofileSpec defines the desired state of resourceprofile
              properties:
                requests:
                  type: object
                  properties: {}
                  description: >-
                    requests defines the minimum compute resources (CPU, memory,
                    etc.) required for this profile.

                    Keys are resource names (e.g., "cpu", "memory",
                    "nvidia.com/gpu") and values are resource quantities.
                limits:
                  type: object
                  properties: {}
                  description: >-
                    limits defines the maximum compute resources (CPU, memory,
                    etc.) allowed for this profile.

                    Keys are resource names (e.g., "cpu", "memory",
                    "nvidia.com/gpu") and values are resource quantities.
              required: []
            status:
              type: object
              description: resourceprofileStatus defines the observed state of resourceprofile
              properties:
                conditions:
                  type: array
                  description: Conditions describing the current state
                  items:
                    type: object
                    description: Condition contains details for one aspect of the current state of
                      this API Resource.
                    properties: {}
                    required: []
      subresources:
        status: {}
